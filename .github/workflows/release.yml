name: Release Extension

on:
  push:
    tags:
      - 'v*' # This triggers the workflow only when you push a tag like "v1.0.0"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants the action permission to create a GitHub Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Matches your package.json devDependencies

      - name: Install dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile

      - name: Package Extension
        run: npx vsce package --allow-missing-repository -o git-diff-viewer.vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: git-diff-viewer.vsix
          generate_release_notes: true # Auto-generates a changelog based on your commits
